<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="main.css"> 
</head>
<body>
    <h1>Form Survey Daily Event</h1>
    <form id="surveyForm" onsubmit="return handleSubmit(event)">
             <div class="form-control">
              <label for="age" id="label-age">Generasi Tahun Kelahiran</label>
              <select name="age" id="age">
                <option value="" disabled selected>--Pilih Generasi Anda--</option>
                <option value="Baby Boomer">Baby Boomer (1946-1964)</option>
                <option value="Generasi X">Generasi X (1965-1980)</option>
                <option value="Generasi Y">Generasi Y (1981-1996)</option>
                <option value="Generasi Z">Generasi Z (1997-2012)</option>
              </select>
            </div>
        <div class="form-control">
            <label for="role" id="label-role">Asal OPD</label>
            <select name="role" id="role">
                <option value="" disabled selected>--Pilih OPD Anda--</option>
                <option value="Badan Kepegawaian Daerah">Badan Kepegawaian Daerah</option>
                <option value="Bappeda">Bappeda</option>
                <option value="Biro Organisasi">Biro Organisasi</option>
                <option value="DKPP">DKPP</option>
                <option value="Sekretariat Daerah">Sekretariat Daerah</option>
            </select>
        </div>
        <div class="form-control">
            <label for="batch" id="label-batch">Batch yang dilaksanakan</label>
            <select name="batch" id="batch">
                <option value="" disabled selected>--Pilih Batch--</option>
                <option value="Batch 1">Batch 1</option>
                <option value="Batch 2">Batch 2</option>
                <option value="Batch 3">Batch 3</option>
                <option value="Batch 4">Batch 4</option>
                <option value="Batch 5">Batch 5</option>
                <option value="Batch 6">Batch 6</option>
                <option value="Batch 7">Batch 7</option>
                <option value="Batch 8">Batch 8</option>
                <option value="Batch 9">Batch 9</option>
                <option value="Batch 10">Batch 10</option>
                <option value="Batch 11">Batch 11</option>
                <option value="Batch 12">Batch 12</option>
                <option value="Batch 13">Batch 13</option>
                <option value="Batch 14">Batch 14</option>
                <option value="Batch 15">Batch 15</option>
                <option value="Batch 16">Batch 16</option>
                <option value="Batch 17">Batch 17</option>
                <option value="Batch 18">Batch 18</option>
                <option value="Batch 19">Batch 19</option>
                <option value="Batch 20">Batch 20</option>
                <option value="Batch 21">Batch 21</option>
                <option value="Batch 22">Batch 22</option>
                <option value="Batch 23">Batch 23</option>
                <option value="Batch 24">Batch 24</option>
                <option value="Batch 25">Batch 25</option>
                <option value="Batch 26">Batch 26</option>
                <option value="Batch 27">Batch 27</option>
                <option value="Batch 28">Batch 28</option>
                <option value="Batch 29">Batch 29</option>
                <option value="Batch 30">Batch 30</option>
            </select>
        </div>
        <div class="form-control">
            <label>Seberapa paham anda setelah mengikuti kegiatan ini terhadap pemetaan manajemen talenta?</label>
            <label for="recommed-1">
                <input type="radio" id="recommed-1" name="recommed" value="Sangat Paham">Sangat Paham
            </label>
            <label for="recommed-2">
                <input type="radio" id="recommed-2" name="recommed" value="Cukup Paham">Cukup Paham
            </label>
            <label for="recommed-3">
                <input type="radio" id="recommed-3" name="recommed" value="Kurang Paham">Kurang Paham
            </label>
        </div>
        <div class="form-control">
            <label>Kualitas dari materi yang disampaikan?</label>
            <label for="inp-1">
                <input type="checkbox" name="inp" value="Luar Biasa">Luar Biasa
            </label>
            <label for="inp-2">
                <input type="checkbox" name="inp" value="Sangat Baik">Sangat Baik
            </label>
            <label for="inp-3">
                <input type="checkbox" name="inp" value="Kurang Baik">Kurang Baik
            </label>
            <label for="inp-4">
                <input type="checkbox" name="inp" value="Sulit Dipahami">Sulit Dipahami
            </label>
            <label for="inp-5">
                <input type="checkbox" name="inp" value="Kurang Relevan">Kurang Relevan
            </label>
            <label for="inp-6">
                <input type="checkbox" name="inp" value="Materi Kurang Lengkap">Materi Kurang Lengkap
            </label>
        </div>
        <div class="form-control">
            <label for="comment">Saran atau Komentar terhadap kegiatan ini</label>
            <textarea name="comment" id="comment" placeholder="Tulis komen disini"></textarea>
        </div>
        <!-- Submit Button -->
        <button type="submit" value="submit"><span>Submit</span></button>
    </form>

    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxiRXvTQ9X3NU10RAznvjajzkgIG05FvU-lvSnYdwVYOvMYi5isDvDTGDwYPascZn6irA/exec';

        function handleSubmit(e) {
            e.preventDefault();

            const button = document.querySelector('button[type="submit"]');
            const buttonText = button.querySelector('span');
            const form = document.getElementById('surveyForm');
            const formData = new FormData(form);

            button.classList.add('loading');
            buttonText.textContent = 'Mengirim...';

            fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                body: new URLSearchParams(formData)
            })
            .then(response => response.text())
            .then(() => {
                window.location.href = 'thankyou.html';
            })
            .catch(() => {
                button.classList.remove('loading');
                buttonText.textContent = 'Submit';
                alert('Gagal mengirim. Cek URL Apps Script atau jaringan Anda.');
            });

            return false;
        }
    </script>
</body>
</html>
